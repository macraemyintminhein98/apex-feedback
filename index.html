<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Feedback - Instant Landing Page Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">APEX Feedback</h1>
        <p class="text-gray-600 mb-6">Boost your conversions. Get actionable insights for your landing page in 24 hours.</p>
        
        <div class="mb-8">
            <p class="text-5xl font-extrabold text-indigo-600 mb-2">$9.99</p>
            <p class="text-gray-500">per feedback report</p>
        </div>

        <form action="/checkout" method="POST">
            <input type="email" name="email" placeholder="Your email" required class="w-full px-4 py-3 mb-4 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-6 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition duration-300">
                Get Feedback Now
            </button>
        </form>
        
        <p class="text-sm text-gray-400 mt-6">⚡️ Delivered within 24 hours.</p>
    </div>
</body>
</html>
